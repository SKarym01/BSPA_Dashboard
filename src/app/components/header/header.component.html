<header
    class="bg-white/95 backdrop-blur-md border-b border-slate-200 h-16 flex items-center justify-between px-6 fixed top-0 left-0 w-full z-40 transition-all shadow-sm">

    <div class="flex items-center gap-0 cursor-pointer group relative h-full" (click)="goToHome()">
        <!-- Supergraphic Line (Fixed, Full Width) -->
        <img src="assets/supergraphic_line" alt="" class="fixed top-0 left-0 w-screen h-2 object-cover z-50" />

        <div class="flex items-center gap-4 mt-1">
            <div class="flex flex-col justify-center">
                <!-- Smaller Title -->
                <h1
                    class="text-xl font-extrabold tracking-tight text-slate-900 group-hover:text-blue-600 transition-colors">
                    BSPA<span class="font-normal text-slate-400">Dashboard</span>
                </h1>
            </div>
        </div>
    </div>

    <div class="flex items-center gap-6">
        <div class="flex items-center gap-3">
            <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Role</span>
            <select
                [ngModel]="selectedRole"
                (ngModelChange)="onRoleChange($event)"
                class="h-9 min-w-[220px] rounded-md border border-slate-300 bg-white px-3 text-sm font-medium text-slate-700 focus:border-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-100">
                <option [ngValue]="null" disabled>Select role</option>
                <option *ngFor="let role of roles" [ngValue]="role.value">{{ role.label }}</option>
            </select>
        </div>

        <div class="flex items-center gap-4">
            <img src="assets/bosch-logo.svg" alt="Bosch" class="h-14 w-auto" />
        </div>
    </div>
</header>
